{% extends "base.html" %}
{% block title %}Login - SmartHealth Monitor{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to view your health dashboard.</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="identifier">Username or Email</label>
                <input type="text" id="identifier" name="identifier" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        <p class="auth-hint">Demo admin login: <code>admin</code> / <code>admin123</code></p>
    </div>
</div>
{% endblock %}
